# Larion Lite 0.1.0 — default COMMON config (same as CurseForge release).
# Copy to your instance: config/larion_lite-common.toml (when game is closed)
# to restore 0.1.0 behavior if you changed sliders.

[terrain]
terrain_preset = "dramatic_explorer"
caves_enabled = true
cave_threshold = 0.36
cave_noise_scale = 0.054
cave_surface_padding = 12
detail_scale = 0.083
detail_amplitude = 12.5
cave_chamber_scale = 0.029
cave_chamber_threshold = 0.19
# Plateaus / deep canals / hills are preset-driven (dramatic_explorer). Advanced: override in world preset JSON:
# terrain.larion_lite_enhance.elevation_layers — plateau_mid_blocks, deep_canal_depth, hill_amplitude, peak_boost_blocks, ...
